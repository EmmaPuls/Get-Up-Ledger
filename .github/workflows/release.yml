name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Stub release workflow scaffolded by GUA-22. GUA-24 will replace this with
# the real publish pipeline. For now the job verifies the pinned knope
# version installs in CI and that knope.toml parses.

jobs:
  knope-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: knope-dev/action@v2.1.2
        with:
          version: 0.22.4
      - run: knope --version
      - run: knope --help
